<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <span class="nav__logo">MijnRapportage</span>
      <ul class="nav__links">
        <li><a href="#features">Features</a></li>
        <li><a href="#how-it-works">Werkwijze</a></li>
        <li><a href="#download">Download</a></li>
      </ul>
    </div>
  </nav>

  {{ content }}

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__logo">MijnRapportage</span>
        <p>
          Copyright &copy; {% assign year = 'now' | date: "%Y" %}{{ year }} Jay Smeekes &mdash;
          Released under the <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" rel="noopener">GNU GPL&nbsp;v3.0</a>
        </p>
        <p>
          <a href="https://github.com/sjaaj" target="_blank" rel="noopener">GitHub</a> &middot;
          <a href="mailto:info@mijnrapportage.nl">Contact</a>
        </p>
      </div>
    </div>
  </footer>

</body>
</html>
