name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned .app
        run: |
          cd build/ios/iphoneos
          zip -r -X MijnRapportage-ios-unsigned.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/MijnRapportage-ios-unsigned.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package .app
        run: |
          cd build/macos/Build/Products/Release
          zip -r -X MijnRapportage-macos.zip *.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/macos/Build/Products/Release/MijnRapportage-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath MijnRapportage-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: MijnRapportage-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package bundle
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../MijnRapportage-linux.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: MijnRapportage-linux.tar.gz

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter pub get
      - run: flutter build web --release
      - name: Package build
        run: |
          cd build/web
          zip -r -X ../../MijnRapportage-web.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: MijnRapportage-web.zip

  release:
    needs:
      - build-android
      - build-ios
      - build-macos
      - build-windows
      - build-linux
      - build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/android-apk/app-release.apk \
            artifacts/ios-app/MijnRapportage-ios-unsigned.zip \
            artifacts/macos-app/MijnRapportage-macos.zip \
            artifacts/windows-app/MijnRapportage-windows.zip \
            artifacts/linux-app/MijnRapportage-linux.tar.gz \
            artifacts/web-app/MijnRapportage-web.zip \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
